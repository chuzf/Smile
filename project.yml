name: SmileJar
options:
  deploymentTarget:
    iOS: "17.0"
  bundleIdPrefix: com.smilejar
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: zh-Hans
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: YES
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: "-"
targets:
  SmileJar:
    type: application
    platform: iOS
    sources:
      - path: SmileJar
        excludes: [Info.plist, SmileJar.entitlements]
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: SmileJar/SmileJar.entitlements
    info:
      path: SmileJar/Info.plist
      properties:
        CFBundleDisplayName: 微笑储蓄罐
        NSCameraUsageDescription: "用于拍摄记录"
        NSPhotoLibraryUsageDescription: "用于添加照片/视频到记录"
        NSMicrophoneUsageDescription: "用于录音"
        NSSpeechRecognitionUsageDescription: "用于将录音转为文字,便于搜索"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
    dependencies: []
  SmileJarTests:
    type: bundle.unit-test
    platform: iOS
    sources: [SmileJarTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: SmileJar
      - package: swift-snapshot-testing
        product: SnapshotTesting
packages:
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
